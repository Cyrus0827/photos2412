<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>树德中学（宁夏街校区）2024级12班</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
    body {
        background-color: #ffffff;
        color: #000000;            
        font-family: "PingFang SC", "STHeiti", "Microsoft YaHei", sans-serif;
        margin: 0;
        padding: 20px;
        -webkit-font-smoothing: antialiased;
    }

    .max-w-4xl, .max-w-2xl, .container {
        max-width: 900px !important;
        margin: 0 auto;
    }

    h1 {
        font-size: 1.5rem !important;
        font-weight: 700;
        letter-spacing: -0.5px;
        margin-bottom: 0.5rem;
        text-align: center !important; 
    }

    p {
        color: #666 !important;
        font-size: 0.875rem;
        margin-bottom: 2rem;
    }

    .bg-blue-50, .bg-white.rounded-2xl {
        background: none !important;
        border: none !important;
        padding: 0 !important;
        box-shadow: none !important;
        text-align: left !important;
    }

    button, .bg-blue-600 {
        background-color: #000000 !important;
        color: #ffffff !important;
        border-radius: 0px !important;       
        padding: 10px 24px !important;
        font-size: 0.875rem !important;
        font-weight: 500;
        border: 1px solid #000 !important;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    button:hover {
        background-color: #ffffff !important;
        color: #000000 !important;
    }

    #status {
        color: #999 !important;
        font-family: monospace;
        margin-left: 10px;
    }

    h2 {
        font-size: 0.75rem !important;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: #999;
        margin-top: 3rem;
        margin-bottom: 1.5rem;
        border-bottom: 1px solid #eee;
        padding-bottom: 10px;
    }

    #gallery, .grid {
        display: grid !important;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)) !important;
        gap: 4px !important; 
    }

    .aspect-square, .img-item {
        border-radius: 0px !important; 
        background-color: #f5f5f5 !important;
        overflow: hidden;
        border: 1px solid #eee;
    }

    img {
        border-radius: 0px !important;
        filter: grayscale(50%);
        transition: filter 0.4s ease;
    }

    img:hover {
        filter: grayscale(0%);
    }

    .upload-container {
    margin-top: 30px;
    border: 1px dashed #ccc; 
    padding: 40px;
    text-align: center;
    transition: all 0.2s ease;
}

.upload-container.drag-over {
    border-color: #000;
    background-color: #f9f9f9;
}

.upload-container p {
    margin: 0;
    font-size: 14px;
    color: #666;
}

.upload-link {
    color: #000;
    text-decoration: underline;
    cursor: pointer;
    font-weight: 500;
}

#status {
    display: block;
    margin-top: 10px;
    font-size: 12px;
    color: #999;
}

    /*移动端优化*/
    @media (max-width: 640px) {
        #gallery {
            grid-template-columns: repeat(3, 1fr) !important;
        }
    }
</style>


    
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="max-w-4xl mx-auto p-6">
        <div class="header">
    <h1>树德中学 (宁夏街) 12班 班牌投稿</h1>
    
    <div id="dropZone" class="upload-container">
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
        <p>将照片拖到这里，或 <span class="upload-link" onclick="document.getElementById('fileInput').click()">点击上传</span></p>
        <span id="status">等待操作...</span>
    </div>
</div>

        <h2 class="text-xl font-bold mb-4 text-gray-700">最新投稿</h2>
        
        <div id="gallery" class="grid grid-cols-2 md:grid-cols-3 gap-4">
            </div>
    </div>

<script>
    const SUPABASE_URL = 'https://kjzehxyylnmbfoepvosu.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqemVoeHl5bG5tYmZvZXB2b3N1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMzIzMDcsImV4cCI6MjA4ODgwODMwN30.J1UxjETFY0rxPbMTPj8xC14oaE2Gdc-kADWE8XVcV88';
    
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const status = document.getElementById('status');
    const gallery = document.getElementById('gallery');

    async function handleFileUpload(file) {
        if (!file) return;

        if (!file.type.startsWith('image/')) {
            status.innerText = "错误：只能上传图片文件";
            return;
        }

        status.innerText = "正在上传：" + file.name + "...";

        const fileExt = file.name.split('.').pop();
        const fileName = `${Date.now()}-${Math.random().toString(36).substring(7)}.${fileExt}`;

        const { data, error } = await supabaseClient.storage
            .from('photos')
            .upload(fileName, file);

        if (error) {
            console.error("上传失败:", error);
            status.innerText = "失败：" + error.message;
        } else {
            status.innerText = "上传成功";
            setTimeout(loadImages, 800);
        }
    }

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, e => {
            e.preventDefault();
            e.stopPropagation();
        }, false);
    });

    ['dragenter', 'dragover'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => dropZone.classList.add('drag-over'), false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => dropZone.classList.remove('drag-over'), false);
    });

    dropZone.addEventListener('drop', e => {
        const files = e.dataTransfer.files;
        if (files.length > 0) {
            handleFileUpload(files[0]);
        }
    });

    fileInput.onchange = (e) => {
        if (e.target.files.length > 0) {
            handleFileUpload(e.target.files[0]);
        }
    };

    async function loadImages() {
        const { data, error } = await supabaseClient.storage.from('photos').list('', {
            limit: 100,
            sortBy: { column: 'created_at', order: 'desc' }
        });

        if (error) {
            console.error("加载列表失败:", error);
            return;
        }

        gallery.innerHTML = ''; 

        data.forEach(item => {
            if (item.name.startsWith('.')) return;

            const { data: { publicUrl } } = supabaseClient.storage
                .from('photos')
                .getPublicUrl(item.name);
            
            const div = document.createElement('div');
            div.className = "img-item";
            
            div.innerHTML = `
                <img src="${publicUrl}" 
                     loading="lazy" 
                     onclick="window.open('${publicUrl}')"
                     onerror="this.parentElement.remove()">
            `;
            gallery.appendChild(div);
        });
    }
    loadImages();
</script>
</body>
</html>
