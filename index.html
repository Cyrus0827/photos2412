<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>树德中学（宁夏街校区）2024级12班</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
    /* 1. 基础风格：回归纯粹的黑白灰，去除所有圆角和阴影 */
    body {
        background-color: #ffffff; /* 纯白背景 */
        color: #000000;            /* 纯黑文字 */
        font-family: "PingFang SC", "STHeiti", "Microsoft YaHei", sans-serif;
        margin: 0;
        padding: 20px;
        -webkit-font-smoothing: antialiased;
    }

    .max-w-4xl, .max-w-2xl, .container {
        max-width: 900px !important;
        margin: 0 auto;
    }

    /* 2. 头部：朴素的文字排版 */
    h1 {
        font-size: 1.5rem !important;
        font-weight: 700;
        letter-spacing: -0.5px;
        margin-bottom: 0.5rem;
        text-align: left !important; /* 改为左对齐 */
    }

    p {
        color: #666 !important;
        font-size: 0.875rem;
        margin-bottom: 2rem;
    }

    /* 3. 上传区域：黑框按钮风格 */
    .bg-blue-50, .bg-white.rounded-2xl {
        background: none !important;
        border: none !important;
        padding: 0 !important;
        box-shadow: none !important;
        text-align: left !important;
    }

    button, .bg-blue-600 {
        background-color: #000000 !important; /* 纯黑按钮 */
        color: #ffffff !important;
        border-radius: 0px !important;        /* 去除圆角 */
        padding: 10px 24px !important;
        font-size: 0.875rem !important;
        font-weight: 500;
        border: 1px solid #000 !important;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    button:hover {
        background-color: #ffffff !important;
        color: #000000 !important;
    }

    #status {
        color: #999 !important;
        font-family: monospace;
        margin-left: 10px;
    }

    /* 4. 图片墙：紧凑平铺 */
    h2 {
        font-size: 0.75rem !important;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: #999;
        margin-top: 3rem;
        margin-bottom: 1.5rem;
        border-bottom: 1px solid #eee;
        padding-bottom: 10px;
    }

    #gallery, .grid {
        display: grid !important;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)) !important;
        gap: 4px !important; /* 极小间距，像照片墙 */
    }

    /* 图片项：保持直角 */
    .aspect-square, .img-item {
        border-radius: 0px !important; 
        background-color: #f5f5f5 !important;
        overflow: hidden;
        border: 1px solid #eee; /* 给白底图片加个微弱边框 */
    }

    img {
        border-radius: 0px !important;
        filter: grayscale(100%); /* 默认黑白，极其朴素 */
        transition: filter 0.4s ease;
    }

    img:hover {
        filter: grayscale(0%); /* 鼠标悬停变彩色 */
    }

    /* 针对移动端的优化 */
    @media (max-width: 640px) {
        #gallery {
            grid-template-columns: repeat(3, 1fr) !important;
        }
    }
</style>


    
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="max-w-4xl mx-auto p-6">
        <div class="bg-white rounded-2xl shadow-sm p-8 mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">树德中学（宁夏街校区）2024级12班 班牌投稿</h1>
            
            
            <div class="mt-6 flex flex-col items-center justify-center border-2 border-dashed border-blue-200 rounded-xl p-6 bg-blue-50">
                <input type="file" id="fileInput" accept="image/*" class="hidden">
                <button onclick="document.getElementById('fileInput').click()" class="bg-blue-600 text-white px-6 py-2 rounded-full hover:bg-blue-700 transition">选择照片投稿</button>
                <p id="status" class="mt-3 text-sm text-gray-600">支持 JPG/PNG，图片会自动公开</p>
            </div>
        </div>

        <h2 class="text-xl font-bold mb-4 text-gray-700">最新投稿</h2>
        <div id="gallery" class="grid grid-cols-2 md:grid-cols-3 gap-4">
            </div>
    </div>

    <script>
const SUPABASE_URL = 'https://kjzehxyylnmbfoepvosu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqemVoeHl5bG5tYmZvZXB2b3N1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMzIzMDcsImV4cCI6MjA4ODgwODMwN30.J1UxjETFY0rxPbMTPj8xC14oaE2Gdc-kADWE8XVcV88';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const fileInput = document.getElementById('fileInput');
const status = document.getElementById('status');
const gallery = document.getElementById('gallery');

fileInput.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    status.innerText = "正在上传中...";
    const fileName = `${Date.now()}-${Math.random().toString(36).substring(7)}.${file.name.split('.').pop()}`;

    const { data, error } = await supabaseClient.storage
        .from('photos')
        .upload(fileName, file);

    if (error) {
        status.innerText = "上传失败: " + error.message;
    } else {
        status.innerText = "投稿成功！";
        loadImages(); 
    }
};

async function loadImages() {
    const { data, error } = await supabaseClient.storage.from('photos').list('', {
        limit: 100,
        sortBy: { column: 'created_at', order: 'desc' }
    });

    if (error) {
        console.error("加载列表失败:", error);
        return;
    }

    gallery.innerHTML = ''; 

    data.forEach(item => {
        if (item.name === '.emptyFolderPlaceholder') return;

        const { data: { publicUrl } } = supabaseClient.storage.from('photos').getPublicUrl(item.name);
        
        const div = document.createElement('div');
        div.className = "aspect-square overflow-hidden rounded-lg bg-gray-200 shadow-sm relative group";
        
        div.innerHTML = `
            <img src="${publicUrl}" 
                 class="w-full h-full object-cover hover:scale-110 transition duration-500 cursor-pointer" 
                 onclick="window.open('${publicUrl}')"
                 onerror="this.parentElement.style.display='none'"> 
        `;
        gallery.appendChild(div);
    });
}
        loadImages();
    </script>
</body>
</html>
